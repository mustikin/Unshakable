<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unshakable You — Free Identity Reset Mini-Course</title>
  <meta name="description" content="The free 5-step Identity Reset mini-course by A.B. Mustikin. See It, Name It, Shape It, Live It, Protect It.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-hover: #B8953E;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-text: #8A6C28;
      --gold-border: rgba(201,168,76,0.3);
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --surface2: #F5F3EE;
      --border: rgba(0,0,0,0.09);
      --border-mid: rgba(0,0,0,0.14);
      --text: #1A1714;
      --text-mid: #4A4540;
      --text-muted: #8A837A;
      --text-faint: #B0A99F;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-pill: 20px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
      --danger: #C0392B;
      --success: #2E7D32;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #16140F; --surface: #1E1B14; --surface2: #252118;
        --border: rgba(255,255,255,0.08); --border-mid: rgba(255,255,255,0.13);
        --text: #F0EDE6; --text-mid: #C8C0B4; --text-muted: #847C70; --text-faint: #5C5650;
        --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.3);
        --gold-text: #D4AE5A;
      }
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.7; }

    .shell { display: flex; flex-direction: column; height: 100vh; max-width: 960px; margin: 0 auto; background: var(--surface); box-shadow: var(--shadow); }

    /* TOP BAR */
    .topbar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 54px; border-bottom: 1px solid var(--border); background: var(--surface2); gap: 12px; }

    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .brand-mark { width: 30px; height: 30px; border-radius: 7px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 14px; color: #fff; font-weight: 500; flex-shrink: 0; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; color: var(--text); }
    .brand-name em { color: var(--gold); font-style: normal; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }

    .progress-wrap { display: flex; align-items: center; gap: 10px; }
    .progress-track { width: 130px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; background: var(--gold); transition: width 0.45s ease; }
    .progress-label { font-size: 12px; color: var(--text-muted); min-width: 56px; text-align: right; }

    /* RESET BUTTON */
    .btn-reset {
      display: flex; align-items: center; gap: 5px; padding: 5px 11px;
      font-size: 11px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
      background: transparent; color: var(--text-muted); cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .btn-reset:hover { background: rgba(192,57,43,0.08); border-color: rgba(192,57,43,0.3); color: var(--danger); }
    .btn-reset svg { width: 12px; height: 12px; }

    /* RESET MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border-radius: var(--radius); padding: 28px 28px 24px;
      max-width: 360px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      transform: translateY(8px); transition: transform 0.2s;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(192,57,43,0.1); display: flex; align-items: center; justify-content: center; }
    .modal-icon svg { width: 18px; height: 18px; stroke: var(--danger); fill: none; stroke-width: 2; }
    .modal h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); }
    .modal p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-cancel { flex: 1; padding: 9px; border: 1px solid var(--border-mid); background: transparent; border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif; color: var(--text-mid); cursor: pointer; }
    .btn-cancel:hover { background: var(--surface2); }
    .btn-confirm-reset { flex: 1; padding: 9px; border: none; background: var(--danger); border-radius: var(--radius-sm); font-size: 13px; font-family: 'DM Sans', sans-serif; color: #fff; cursor: pointer; font-weight: 500; }
    .btn-confirm-reset:hover { background: #a93226; }

    /* BODY */
    .body-wrap { display: flex; flex: 1; min-height: 0; }

    /* SIDEBAR */
    .sidebar { flex-shrink: 0; width: 224px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface2); padding: 16px 0; }
    .sidebar-label { padding: 0 16px 8px; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); }
    .sb-btn { display: flex; align-items: flex-start; gap: 10px; width: 100%; padding: 9px 16px; border: none; background: transparent; cursor: pointer; text-align: left; transition: background 0.12s; border-right: 2px solid transparent; }
    .sb-btn:hover { background: rgba(0,0,0,0.04); }
    @media (prefers-color-scheme: dark) { .sb-btn:hover { background: rgba(255,255,255,0.04); } }
    .sb-btn.active { background: var(--gold-dim); border-right-color: var(--gold); }
    .sb-btn.locked { opacity: 0.38; cursor: default; }
    .sb-dot { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; font-weight: 500; color: var(--text-muted); margin-top: 1px; transition: all 0.2s; }
    .sb-btn.done .sb-dot { background: var(--gold); border-color: var(--gold); color: #fff; font-size: 11px; }
    .sb-btn.active .sb-dot { border-color: var(--gold); color: var(--gold); }
    .sb-text { font-size: 12px; color: var(--text-mid); line-height: 1.4; padding-top: 2px; }
    .sb-btn.active .sb-text { color: var(--text); font-weight: 500; }
    .sb-btn.done .sb-text { color: var(--text-muted); }
    .lock-icon { font-size: 10px; }

    /* CONTENT */
    .content { flex: 1; overflow-y: auto; padding: 32px 36px; display: flex; flex-direction: column; gap: 20px; }

    /* LESSON */
    .lesson-meta { display: flex; align-items: center; gap: 10px; }
    .step-pill { font-size: 10px; font-weight: 500; padding: 3px 11px; border-radius: var(--radius-pill); background: var(--gold-dim); color: var(--gold-text); letter-spacing: 0.07em; text-transform: uppercase; }
    .lesson-num { font-size: 12px; color: var(--text-muted); }
    .lesson-h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .lesson-sub { font-size: 13px; color: var(--text-muted); line-height: 1.65; font-style: italic; }
    .divider { height: 1px; background: var(--border); }
    .lesson-body { display: flex; flex-direction: column; gap: 13px; font-size: 14px; color: var(--text-mid); line-height: 1.78; }
    .highlight { border-left: 2.5px solid var(--gold); padding: 12px 16px; background: var(--gold-dim); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; font-size: 13px; line-height: 1.65; color: var(--text); }
    .loop-wrap { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; padding: 13px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .loop-pill { font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: var(--radius-pill); background: var(--gold-dim); color: var(--gold-text); }
    .loop-arrow { font-size: 11px; color: var(--text-faint); }

    /* EXERCISE BOX */
    .exercise-box { border: 1px solid var(--border-mid); border-radius: var(--radius); padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .exercise-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); }
    .exercise-q { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.45; }

    textarea { width: 100%; padding: 10px 13px; font-size: 13px; font-family: 'DM Sans', sans-serif; line-height: 1.65; background: var(--surface2); border: 1px solid var(--border-mid); border-radius: var(--radius-sm); color: var(--text); resize: vertical; min-height: 90px; transition: border-color 0.15s, box-shadow 0.15s; }
    textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    textarea.error { border-color: var(--danger); }

    /* MULTI-CHOICE */
    .mc-options { display: flex; flex-direction: column; gap: 8px; }
    .mc-option {
      display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px;
      border: 1.5px solid var(--border-mid); border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.15s; background: var(--surface2);
      font-size: 13px; color: var(--text-mid); line-height: 1.45;
    }
    .mc-option:hover { border-color: var(--gold-border); background: var(--gold-dim); }
    .mc-option.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--text); }
    .mc-option.error-unselected { border-color: rgba(192,57,43,0.4); }
    .mc-check {
      width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-mid);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      margin-top: 1px; transition: all 0.15s;
    }
    .mc-option.selected .mc-check { background: var(--gold); border-color: var(--gold); }
    .mc-check-inner { width: 7px; height: 7px; border-radius: 50%; background: #fff; opacity: 0; transition: opacity 0.12s; }
    .mc-option.selected .mc-check-inner { opacity: 1; }
    .mc-multi .mc-check { border-radius: 4px; }
    .mc-multi .mc-option.selected .mc-check { background: var(--gold); border-color: var(--gold); }
    .mc-check-tick { display: none; }
    .mc-multi .mc-option.selected .mc-check-tick { display: block; }
    .mc-multi .mc-option.selected .mc-check-inner { display: none; }

    .mc-note { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    /* CORRECT/INCORRECT HIGHLIGHTS */
    .mc-option.correct { border-color: var(--success) !important; background: rgba(46, 125, 50, 0.08) !important; color: var(--text) !important; }
    .mc-option.incorrect { border-color: var(--danger) !important; background: rgba(192, 57, 43, 0.08) !important; }
    .explanation-box { display: none; margin-top: 10px; padding: 12px 14px; background: var(--surface2); border-left: 3px solid var(--gold); border-radius: 4px; font-size: 13px; color: var(--text-mid); line-height: 1.6; }
    .explanation-box.show { display: block; }
    .btn-check-wrap { margin-top: 16px; display: flex; justify-content: flex-start; }
    .btn-check-ans { padding: 8px 20px; font-size: 12px; font-weight: 500; color: var(--gold-text); background: transparent; border: 1.5px solid var(--gold-border); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
    .btn-check-ans:hover { background: var(--gold-dim); border-color: var(--gold); }
    .btn-check-ans:disabled { opacity: 0.5; cursor: not-allowed; }

    /* VALIDATION MESSAGE */
    .val-msg { display: none; font-size: 12px; color: var(--danger); margin-top: 4px; padding: 8px 12px; background: rgba(192,57,43,0.07); border-radius: var(--radius-sm); border-left: 2px solid var(--danger); }
    .val-msg.show { display: block; }

    .key-points { display: flex; flex-direction: column; gap: 7px; }
    .key-point { display: flex; gap: 10px; align-items: flex-start; font-size: 13px; color: var(--text-mid); line-height: 1.55; }
    .kp-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); margin-top: 8px; flex-shrink: 0; }

    /* OVERVIEW */
    .overview { display: flex; flex-direction: column; gap: 22px; padding: 4px 0; }
    .ov-hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 12px; padding-bottom: 22px; border-bottom: 1px solid var(--border); }
    .ov-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-text); padding: 3px 12px; border-radius: var(--radius-pill); background: var(--gold-dim); }
    .ov-title { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 500; color: var(--text); line-height: 1.25; }
    .ov-desc { font-size: 13px; color: var(--text-muted); line-height: 1.65; max-width: 420px; }
    .ov-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .ov-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; text-align: center; }
    .ov-stat-n { font-size: 22px; font-weight: 500; color: var(--gold); }
    .ov-stat-l { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .ov-steps { display: flex; flex-direction: column; gap: 8px; }
    .ov-step { display: flex; align-items: flex-start; gap: 12px; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); }
    .ov-num { width: 26px; height: 26px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--gold-text); flex-shrink: 0; margin-top: 1px; }
    .ov-step-t { font-size: 13px; font-weight: 500; color: var(--text); }
    .ov-step-d { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.45; }
    .ov-author { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface2); }
    .ov-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; color: #fff; flex-shrink: 0; }
    .ov-author-name { font-size: 13px; font-weight: 500; color: var(--text); }
    .ov-author-role { font-size: 12px; color: var(--text-muted); }
    .btn-start { width: 100%; padding: 13px; background: var(--gold); border: none; border-radius: var(--radius); color: #fff; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: background 0.15s; letter-spacing: 0.01em; }
    .btn-start:hover { background: var(--gold-hover); }

    /* EMAIL GATE */
    .gate { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 40px 20px; text-align: center; min-height: 360px; }
    .gate-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--gold-dim); display: flex; align-items: center; justify-content: center; }
    .gate-icon svg { width: 22px; height: 22px; stroke: var(--gold); fill: none; stroke-width: 1.8; }
    .gate h2 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 500; color: var(--text); line-height: 1.3; max-width: 380px; }
    .gate p { font-size: 13px; color: var(--text-muted); line-height: 1.65; max-width: 360px; }
    .gate-form { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 360px; }
    .gate-input { width: 100%; padding: 10px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border-mid); border-radius: var(--radius-sm); background: var(--surface2); color: var(--text); transition: border-color 0.15s, box-shadow 0.15s; }
    .gate-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .gate-row { display: flex; gap: 8px; }
    .gate-row .gate-input { flex: 1; }
    .gate-submit { padding: 10px 22px; background: var(--gold); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .gate-submit:hover { background: var(--gold-hover); }
    .gate-error { font-size: 12px; color: var(--danger); display: none; }
    .gate-note { font-size: 11px; color: var(--text-faint); }

    /* CERTIFICATE */
    .cert { display: flex; flex-direction: column; }
    .cert-top { padding: 28px 32px; background: var(--gold-dim); border-bottom: 1px solid var(--gold-border); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .cert-seal { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); }
    .cert-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold-text); }
    .cert-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 500; color: var(--text); }
    .cert-label { font-size: 12px; color: var(--text-muted); }
    .cert-name { font-family: 'Playfair Display', serif; font-size: 20px; font-style: italic; color: var(--gold-text); }
    .cert-book { font-size: 13px; color: var(--text-muted); }
    .cert-body { padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; }
    .cert-steps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .cert-step { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; background: var(--surface2); }
    .cs-n { font-size: 10px; color: var(--text-faint); margin-bottom: 4px; }
    .cs-t { font-size: 11px; font-weight: 500; color: var(--gold-text); }
    .cert-msg { font-size: 13px; color: var(--text-muted); line-height: 1.7; text-align: center; font-style: italic; }
    .cert-ctas { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .btn-book { display: block; width: 100%; max-width: 340px; padding: 13px 24px; background: var(--gold); border: none; border-radius: var(--radius); color: #fff; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; text-decoration: none; text-align: center; cursor: pointer; transition: background 0.15s; }
    .btn-book:hover { background: var(--gold-hover); }
    .btn-cohort { display: block; width: 100%; max-width: 340px; padding: 11px 24px; background: transparent; border: 1px solid var(--border-mid); border-radius: var(--radius); color: var(--text-mid); font-size: 13px; font-family: 'DM Sans', sans-serif; text-decoration: none; text-align: center; cursor: pointer; transition: background 0.12s; }
    .btn-cohort:hover { background: var(--surface2); }
    .cert-date { font-size: 11px; color: var(--text-faint); }
    .cert-share { display: flex; align-items: center; gap: 10px; justify-content: center; font-size: 12px; color: var(--text-muted); }
    .share-pill { padding: 5px 14px; border: 1px solid var(--border-mid); border-radius: var(--radius-pill); font-size: 12px; color: var(--text-mid); background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.12s; }
    .share-pill:hover { background: var(--surface2); }

    /* BOTTOM BAR */
    .bottombar { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-top: 1px solid var(--border); background: var(--surface2); height: 54px; }
    .btn-nav { padding: 7px 18px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
    .btn-prev { background: transparent; border: 1px solid var(--border-mid); color: var(--text-muted); }
    .btn-prev:hover { background: var(--surface2); }
    .btn-next { background: var(--gold); border: none; color: #fff; }
    .btn-next:hover { background: var(--gold-hover); }
    .btn-next:disabled { background: var(--text-faint); cursor: not-allowed; opacity: 0.6; }
    .btn-finish { background: var(--success); border: none; color: #fff; }
    .btn-finish:hover { background: #256228; }
    .btn-finish:disabled { background: var(--text-faint); cursor: not-allowed; opacity: 0.6; }
    .center-info { font-size: 12px; color: var(--text-faint); }

    /* MOBILE */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .content { padding: 20px 18px; gap: 16px; }
      .topbar { padding: 0 16px; }
      .bottombar { padding: 10px 16px; }
      .cert-steps { grid-template-columns: repeat(3, 1fr); }
      .ov-stats { grid-template-columns: repeat(3, 1fr); }
      .progress-track { width: 80px; }
      .btn-reset span { display: none; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- RESET MODAL -->
  <div class="modal-overlay" id="resetModal">
    <div class="modal">
      <div class="modal-icon">

// ── MODAL ──
function openModal() {
  document.getElementById('resetModal').classList.add('open');
}
function closeModal() {
  document.getElementById('resetModal').classList.remove('open');
}
function confirmReset() {
  // Clear all uy_ keys
  Object.keys(localStorage).filter(k => k.startsWith('uy_')).forEach(k => localStorage.removeItem(k));
  emailOk = ''; userName = '';
  done.clear();
  cur = 0;
  closeModal();
  render();
}
document.getElementById('resetModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// ── VALIDATION ──
function validateLesson(l) {
  if (!l.ex) return true;
  let allValid = true;
  const questions = l.ex.questions || [];

  questions.forEach(q => {
    if (q.type === 'textarea') {
      const el = document.getElementById('ex_' + q.id);
      if (!el) return;
      const val = el.value.trim();
      if (!val) {
        el.classList.add('error');
        allValid = false;
      } else {
        el.classList.remove('error');
      }
    } else if (q.type === 'multichoice') {
      const selected = document.querySelectorAll('.mc-option.selected[data-qid="' + q.id + '"]');
      const errEl = document.getElementById('mc_err_' + q.id);
      if (selected.length === 0) {
        allValid = false;
        if (errEl) errEl.classList.add('show');
        // Highlight unselected options briefly
        document.querySelectorAll('.mc-option[data-qid="' + q.id + '"]').forEach(o => {
          if (!o.classList.contains('selected')) o.classList.add('error-unselected');
        });
      } else {
        if (errEl) errEl.classList.remove('show');
        document.querySelectorAll('.mc-option[data-qid="' + q.id + '"]').forEach(o => {
          o.classList.remove('error-unselected');
        });
      }
    }
  });
  return allValid;
}

function checkCanProceed(l) {
  if (!l || !l.ex) return true;
  const questions = l.ex.questions || [];
  for (const q of questions) {
    if (q.type === 'textarea') {
      const el = document.getElementById('ex_' + q.id);
      if (!el || !el.value.trim()) return false;
    } else if (q.type === 'multichoice') {
      const selected = document.querySelectorAll('.mc-option.selected[data-qid="' + q.id + '"]');
      if (selected.length === 0) return false;
      // Requirement: Check answer must be clicked
      if (localStorage.getItem('uy_checked_' + q.id) !== 'true') return false;
    }
  }
  return true;
}

function updateNextBtn() {
  const l = LESSONS[cur];
  const btn = document.getElementById('btnNext');
  if (!btn) return;
  // Overview and cert don't need validation
  if (!l || l.type === 'overview' || l.type === 'cert') return;
  // Check answers
  btn.disabled = !checkCanProceed(l);
}

// ── SIDEBAR ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-label">Pillars</div>';
  const allPillarsDone = [1,2,3,4,5,6,7,8].every(i => done.has(i));
  LESSONS.forEach((l, i) => {
    const isDone = done.has(i);
    const isActive = i === cur;
    // Cert locked until all 8 pillars complete
    const isCertLocked = l.id === 'cert' && !allPillarsDone;
    // Pillars 3-8 locked until email
    const isEmailLocked = l.gated && !emailOk && i > cur && !isDone && l.id !== 'cert';
    const isLocked = isCertLocked || isEmailLocked;
    let cls = 'sb-btn';
    if (isActive) cls += ' active';
    if (isDone) cls += ' done';
    if (isLocked) cls += ' locked';
    const dotContent = isDone ? '✓' : i === 0 ? '★' : i === LESSONS.length - 1 ? '✦' : i;
    const btn = document.createElement('button');
    btn.className = cls;
    btn.setAttribute('aria-label', l.sidebar + (isDone ? ' (completed)' : '') + (isLocked ? ' (locked)' : ''));
    btn.innerHTML = `<div class="sb-dot">${dotContent}</div><div class="sb-text">${l.sidebar}${isLocked ? ' <span class="lock-icon">🔒</span>' : ''}</div>`;
    btn.onclick = () => {
      if (isLocked) return;
      if (l.gated && !emailOk) { cur = i; showGate(); buildSidebar(); updateBars(); return; }
      cur = i; render();
    };
    sb.appendChild(btn);
  });
}

// ── GATE ──
function buildGate() {
  return `<div class="gate">
    <div class="gate-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h2>Pillars 3–8 are free — just drop your details below</h2>
    <p>Enter your name and email to unlock the rest of the course. You will also receive a copy of your reflection answers and your completion certificate.</p>
    <div class="gate-form">
      <input class="gate-input" type="text" id="gname" placeholder="Your first name" autocomplete="given-name"/>
      <div class="gate-row">
        <input class="gate-input" type="email" id="gemail" placeholder="Your email address" autocomplete="email"/>
        <button class="gate-submit" onclick="submitGate()">Unlock →</button>
      </div>
      <div class="gate-error" id="gate-err">Please enter a valid name and email.</div>
      <div class="gate-note">No spam. Used only to send your course progress and certificate.</div>
    </div>
  </div>`;
}

function submitGate() {
  const n = document.getElementById('gname').value.trim();
  const e = document.getElementById('gemail').value.trim();
  const err = document.getElementById('gate-err');
  if (!n || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) {
    err.style.display = 'block'; return;
  }
  
  // Save locally
  emailOk = e; userName = n;
  localStorage.setItem('uy_email', e);
  localStorage.setItem('uy_name', n);
  
  // Send to backend if configured
  if (EMAIL_COLLECTION_ENDPOINT) {
    sendEmailToBackend(n, e);
  }
  
  render();
}

async function sendEmailToBackend(name, email) {
  try {
    const formData = new FormData();
    formData.append('name', name);
    formData.append('email', email);
    formData.append('message', `Course: Unshakable You - Identity Reset Mini-Course\nTimestamp: ${new Date().toISOString()}`);
    
    const response = await fetch(EMAIL_COLLECTION_ENDPOINT, {
      method: 'POST',
      body: formData
    });
    
    if (!response.ok) {
      console.warn('Failed to send email to backend:', response.status);
    } else {
      console.log('Email collected successfully');
    }
  } catch (err) {
    console.warn('Error sending email to backend:', err);
  }
}

// ── BUILD EXERCISE ──
function buildExercise(l) {
  if (!l.ex) return '';
  const questions = l.ex.questions || [];
  let html = `<div class="exercise-box"><div class="exercise-label">Reflection exercise</div>`;

  questions.forEach((q, qi) => {
    if (qi > 0) html += `<div class="divider" style="margin: 4px 0;"></div>`;

    if (q.type === 'textarea') {
      const saved = localStorage.getItem('uy_ex_' + q.id) || '';
      html += `<div class="exercise-q">${q.q}</div>
        <textarea id="ex_${q.id}" rows="4" placeholder="${q.placeholder || ''}">${saved}</textarea>`;
    } else if (q.type === 'multichoice') {
      const savedRaw = localStorage.getItem('uy_mc_' + q.id) || '[]';
      const isChecked = localStorage.getItem('uy_checked_' + q.id) === 'true';
      let saved = [];
      try { saved = JSON.parse(savedRaw); } catch(e) {}
      
      html += `<div class="exercise-q">${q.q}</div>`;
      if (q.note) html += `<div class="mc-note">${q.note}</div>`;
      html += `<div class="mc-options${q.multi ? ' mc-multi' : ''}" id="mc_opts_${q.id}">`;
      
      q.options.forEach((opt, oi) => {
        let cls = 'mc-option';
        if (saved.includes(oi)) cls += ' selected';
        if (isChecked) {
          const isCorrect = Array.isArray(q.correct) ? q.correct.includes(oi) : q.correct === oi;
          if (isCorrect) cls += ' correct';
          else if (saved.includes(oi)) cls += ' incorrect';
        }
        
        html += `<div class="${cls}" data-qid="${q.id}" data-oi="${oi}" onclick="toggleMC(this, '${q.id}', ${oi}, ${q.multi})">
          <div class="mc-check">
            <div class="mc-check-inner"></div>
            <svg class="mc-check-tick" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <span>${opt}</span>
        </div>`;
      });
      
      html += `</div>
        <div class="explanation-box ${isChecked ? 'show' : ''}" id="expl_${q.id}">
          <div style="font-weight: 500; margin-bottom: 4px; color: var(--gold-text);">Explanation:</div>
          ${q.explanation}
        </div>
        <div class="val-msg" id="mc_err_${q.id}">Please select an option to continue.</div>
        <div class="btn-check-wrap">
          <button class="btn-check-ans" id="btn_check_${q.id}" onclick="checkAnswer('${q.id}')" ${isChecked ? 'style="display:none"' : ''}>Check answer</button>
        </div>`;
    }
  });

  html += `</div>`;
  return html;
}

function checkAnswer(qid) {
  const selected = [...document.querySelectorAll(`.mc-option.selected[data-qid="${qid}"]`)].map(o => parseInt(o.dataset.oi));
  if (selected.length === 0) {
    const errEl = document.getElementById('mc_err_' + qid);
    if (errEl) errEl.classList.add('show');
    return;
  }
  
  localStorage.setItem('uy_checked_' + qid, 'true');
  
  // Find question data
  let qData = null;
  LESSONS.forEach(l => {
    if (l.ex && l.ex.questions) {
      const found = l.ex.questions.find(q => q.id === qid);
      if (found) qData = found;
    }
  });
  
  if (!qData) return;
  
  // Highlight
  document.querySelectorAll(`.mc-option[data-qid="${qid}"]`).forEach(o => {
    const oi = parseInt(o.dataset.oi);
    const isCorrect = Array.isArray(qData.correct) ? qData.correct.includes(oi) : qData.correct === oi;
    if (isCorrect) o.classList.add('correct');
    else if (o.classList.contains('selected')) o.classList.add('incorrect');
  });
  
  // Show explanation
  const expl = document.getElementById('expl_' + qid);
  if (expl) expl.classList.add('show');
  
  // Hide button
  const btn = document.getElementById('btn_check_' + qid);
  if (btn) btn.style.display = 'none';
  
  updateNextBtn();
}

function toggleMC(el, qid, oi, multi) {
  // If already checked, ignore clicks or reset checked state? 
  // User says "Check answer" before moving on. Usually it's better to allow changes but reset highlights.
  const isChecked = localStorage.getItem('uy_checked_' + qid) === 'true';
  if (isChecked) {
    localStorage.removeItem('uy_checked_' + qid);
    document.getElementById('btn_check_' + qid).style.display = 'block';
    document.getElementById('expl_' + qid).classList.remove('show');
    document.querySelectorAll(`.mc-option[data-qid="${qid}"]`).forEach(o => o.classList.remove('correct', 'incorrect'));
  }

  if (multi) {
    el.classList.toggle('selected');
  } else {
    document.querySelectorAll(`.mc-option[data-qid="${qid}"]`).forEach(o => o.classList.remove('selected', 'error-unselected'));
    el.classList.add('selected');
  }
  // Save
  const selected = [...document.querySelectorAll(`.mc-option.selected[data-qid="${qid}"]`)].map(o => parseInt(o.dataset.oi));
  localStorage.setItem('uy_mc_' + qid, JSON.stringify(selected));
  // Clear error if any selected
  const errEl = document.getElementById('mc_err_' + qid);
  if (errEl && selected.length > 0) errEl.classList.remove('show');
  el.classList.remove('error-unselected');
  updateNextBtn();
}

// ── BUILD LESSON ──
function buildLesson(l) {
  const idx = cur;
  let loopHTML = '';
  if (l.loop) {
    loopHTML = `<div class="loop-wrap">${l.loop.map(x => x === '→' ? `<span class="loop-arrow">→</span>` : `<span class="loop-pill">${x}</span>`).join('')}</div>`;
  }
  return `
    <div class="lesson-meta">
      <span class="step-pill">${l.step}</span>
      <span class="lesson-num">Pillar ${idx} of ${TOTAL_LESSONS}</span>
    </div>
    <div class="lesson-h1">${l.title}</div>
    <div class="lesson-sub">${l.sub}</div>
    <div class="divider"></div>
    <div class="lesson-body">
      ${l.body.map(p => `<p>${p}</p>`).join('')}
      ${l.highlight ? `<div class="highlight">${l.highlight}</div>` : ''}
      ${loopHTML}
    </div>
    ${buildExercise(l)}
    <div class="key-points">
      ${l.kp.map(k => `<div class="key-point"><div class="kp-dot"></div><span>${k}</span></div>`).join('')}
    </div>
  `;
}

function showGate() {
  document.getElementById('content').innerHTML = buildGate();
  document.getElementById('btnPrev').style.visibility = 'visible';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('centerInfo').textContent = 'Free to unlock — enter your details above';
}

function updateBars() {
  const lessonIdx = cur === 0 ? 0 : LESSONS[cur].id === 'cert' ? TOTAL_LESSONS : cur;
  const pct = Math.round((lessonIdx / TOTAL_LESSONS) * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent =
    cur === 0 ? 'Overview' :
    LESSONS[cur].id === 'cert' ? 'Complete!' :
    cur + ' / ' + TOTAL_LESSONS;
}

function render() {
  const l = LESSONS[cur];
  const content = document.getElementById('content');
  content.scrollTop = 0;
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  const ci = document.getElementById('centerInfo');
  next.style.display = '';
  next.disabled = false;
  ci.textContent = '';

  if (l.type === 'overview') {
    content.innerHTML = buildOverview();
    prev.style.visibility = 'hidden';
    next.textContent = 'Begin Pillar 1 →';
    next.className = 'btn-nav btn-next';
  } else if (l.type === 'cert') {
    const allPillarsDone = [1,2,3,4,5,6,7,8].every(i => done.has(i));
    if (!emailOk) { showGate(); buildSidebar(); updateBars(); return; }
    if (!allPillarsDone) {
      // Show locked cert message
      content.innerHTML = `<div class="gate">
        <div class="gate-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <h2>Complete all 8 Pillars to unlock your certificate</h2>
        <p>You're almost there. Finish all pillars to earn your certificate of completion.</p>
      </div>`;
      prev.style.visibility = 'visible';
      next.style.display = 'none';
      ci.textContent = 'Complete all pillars first';
      buildSidebar(); updateBars(); return;
    }
    content.innerHTML = buildCert();
    prev.style.visibility = 'visible';
    next.style.display = 'none';
    ci.textContent = '🎉 Course complete';
  } else {
    if (l.gated && !emailOk) { showGate(); buildSidebar(); updateBars(); return; }
    content.innerHTML = buildLesson(l);
    prev.style.visibility = cur <= 1 ? 'hidden' : 'visible';
    const isLast = cur === LESSONS.length - 2;
    next.textContent = isLast ? 'Finish & get certificate →' : 'Next Pillar →';
    next.className = isLast ? 'btn-nav btn-finish' : 'btn-nav btn-next';

    // Wire up textarea auto-save + live validation
    if (l.ex) {
      (l.ex.questions || []).forEach(q => {
        if (q.type === 'textarea') {
          const inp = document.getElementById('ex_' + q.id);
          if (inp) {
            inp.addEventListener('input', () => {
              localStorage.setItem('uy_ex_' + q.id, inp.value);
              inp.classList.remove('error');
              updateNextBtn();
            });
          }
        }
      });
    }
    updateNextBtn();
  }

  buildSidebar();
  updateBars();
}

function go(dir) {
  if (dir === 1 && cur < LESSONS.length - 1) {
    const l = LESSONS[cur];
    // Validate before advancing (skip for overview)
    if (l.type !== 'overview' && l.type !== 'cert') {
      if (!validateLesson(l)) {
        // Scroll to first error
        const firstErr = document.querySelector('.error, .val-msg.show');
        if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
    }
    done.add(cur); save();
    cur++;
    const next = LESSONS[cur];
    
    // Send completion data if on certificate page and endpoint configured
    if (next.id === 'cert' && EMAIL_COLLECTION_ENDPOINT && emailOk) {
      sendCompletionToBackend();
    }
    
    if (next.gated && !emailOk) { showGate(); buildSidebar(); updateBars(); return; }
    render();
  } else if (dir === -1 && cur > 0) {
    cur--;
    render();
  }
}

async function sendCompletionToBackend() {
  // Only send if user has valid email (emailOk is set when form is submitted successfully)
  if (!emailOk) {
    console.log('No user email available, skipping completion email');
    return;
  }

  try {
    // Gather all answers
    const answers = {};
    LESSONS.forEach(l => {
      if (l.ex && l.ex.questions) {
        l.ex.questions.forEach(q => {
          if (q.type === 'textarea') {
            answers[q.id] = localStorage.getItem('uy_ex_' + q.id) || '';
          } else if (q.type === 'multichoice') {
            const saved = localStorage.getItem('uy_mc_' + q.id) || '[]';
            try {
              answers[q.id] = JSON.parse(saved);
            } catch(e) {
              answers[q.id] = [];
            }
          }
        });
      }
    });
    
    const response = await fetch(EMAIL_COLLECTION_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: userName,
        email: emailOk,
        course: 'Unshakable You - Identity Reset Mini-Course',
        status: 'completed',
        answers: answers,
        completedAt: new Date().toISOString(),
        sendToUser: true
      })
    });
    
    if (!response.ok) {
      console.warn('Failed to send completion email to user:', response.status);
    } else {
      console.log('Completion email sent to user successfully');
    }
  } catch (err) {
    console.warn('Error sending completion email to user:', err);
  }
}

render();
</script>
